<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <main>
        <div id="calculator">
            <div id="display" aria-live="polite" role="status">0</div>
            <div id="buttons">
                <button aria-label="add">+</button>
                <button aria-label="subtract">&minus;</button>
                <button aria-label="divide">&divide;</button>
                <button aria-label="multiply">&times;</button>
                <button>0</button>
                <button>1</button>
                <button>2</button>
                <button>3</button>
                <button>4</button>
                <button>5</button>
                <button>6</button>
                <button>7</button>
                <button>8</button>
                <button>9</button>
                <button aria-label="equals">=</button>
                <button aria-label="clear">C</button>
                <button>.</button>
            </div>
        </div>
    </main>
</body>

</html>
